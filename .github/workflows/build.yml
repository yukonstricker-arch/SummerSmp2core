name: Build Plugin

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out files
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build the jar
        run: mvn -B package

      - name: Upload the finished jar
        uses: actions/upload-artifact@v4
        with:
          name: SummerSMPCore-jar
          path: target/SummerSMPCore-*.jar
